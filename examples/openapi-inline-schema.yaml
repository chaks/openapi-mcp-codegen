openapi: 3.1.0
info:
  title: Sample API with Inline Schemas
  version: 1.0.0
  description: An example of OpenAPI 3.1 with schemas defined inline.
servers:
  - url: https://api.example.com

paths:
  /users:
    post:
      summary: Create a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - username
                - email
              properties:
                username:
                  type: string
                  description: The user's unique username.
                email:
                  type: string
                  format: email
                  description: The user's email address.
                age:
                  type: integer
                  description: The user's age.
                  minimum: 18
              example:
                username: bobsmith
                email: bob@example.com
                age: 37
      responses:
        '201':
          description: User created successfully
    get:
      summary: Retrieve a list of users
      responses:
        '200':
          description: A list of user objects
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  required:
                    - id
                    - username
                  properties:
                    id:
                      type: integer
                      format: int64
                    username:
                      type: string
                    email:
                      type: ["string", "null"] # OpenAPI 3.1 uses type array for nullable fields
