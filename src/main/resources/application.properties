# Quarkus configuration for OpenAPI to MCP Generator
# Application name
quarkus.application.name=openapi-to-mcp-generator
# Logging
quarkus.log.level=INFO
quarkus.log.category."io.github.chaks.openapi2mcp".level=INFO
# Quarkus Picocli configuration
quarkus.picocli.top-command=io.github.chaks.openapi2mcp.cli.CliCommand